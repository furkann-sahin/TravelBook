# ===================== COMPONENTS =====================
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token ile kimlik doğrulama

  parameters:
    userId:
      name: userId
      in: path
      required: true
      description: Kullanıcı ID'si
      schema:
        type: string

    tourId:
      name: tourId
      in: path
      required: true
      description: Tur ID'si
      schema:
        type: string

    companyId:
      name: companyId
      in: path
      required: true
      description: Firma ID'si
      schema:
        type: string

    guideId:
      name: guideId
      in: path
      required: true
      description: Rehber ID'si
      schema:
        type: string

    reviewId:
      name: reviewId
      in: path
      required: true
      description: Yorum ID'si
      schema:
        type: string

  schemas:
    # ---- Auth Schemas ----
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          format: password
          example: "P@ssw0rd123"

    AuthResponse:
      type: object
      properties:
        token:
          type: string
          description: JWT erişim token'ı
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        userId:
          type: string
          example: "usr_12345"
        role:
          type: string
          enum: [user, company, guide]
          example: "user"

    # ---- User Schemas ----
    UserRegisterRequest:
      type: object
      required: [firstName, lastName, email, password]
      properties:
        firstName:
          type: string
          example: "Ali"
        lastName:
          type: string
          example: "Yılmaz"
        email:
          type: string
          format: email
          example: "ali.yilmaz@example.com"
        password:
          type: string
          format: password
          minLength: 8
          example: "P@ssw0rd123"
        gender:
          type: string
          enum: [male, female, other]
          example: "male"
        location:
          type: string
          example: "İstanbul, Türkiye"

    UserProfile:
      type: object
      properties:
        id:
          type: string
          example: "usr_12345"
        firstName:
          type: string
          example: "Ali"
        lastName:
          type: string
          example: "Yılmaz"
        email:
          type: string
          format: email
          example: "ali.yilmaz@example.com"
        gender:
          type: string
          enum: [male, female, other]
          example: "male"
        location:
          type: string
          example: "İstanbul, Türkiye"
        createdAt:
          type: string
          format: date-time
          example: "2025-01-15T10:30:00Z"

    PasswordUpdateRequest:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
          format: password
          example: "OldP@ssw0rd"
        newPassword:
          type: string
          format: password
          minLength: 8
          example: "NewP@ssw0rd123"

    # ---- Tour Schemas ----
    TourSummary:
      type: object
      properties:
        id:
          type: string
          example: "tour_001"
        name:
          type: string
          example: "Kapadokya Balon Turu"
        location:
          type: string
          example: "Nevşehir, Kapadokya"
        price:
          type: number
          format: double
          example: 2500.00
        startDate:
          type: string
          format: date
          example: "2026-06-15"
        endDate:
          type: string
          format: date
          example: "2026-06-18"
        imageUrl:
          type: string
          format: uri
          example: "https://example.com/images/kapadokya.jpg"
        companyName:
          type: string
          example: "Gezgin Tur A.Ş."
        rating:
          type: number
          format: double
          example: 4.7

    TourDetail:
      type: object
      properties:
        id:
          type: string
          example: "tour_001"
        name:
          type: string
          example: "Kapadokya Balon Turu"
        description:
          type: string
          example: "Kapadokya'nın büyüleyici peri bacalarını kuş bakışı görün..."
        location:
          type: string
          example: "Nevşehir, Kapadokya"
        price:
          type: number
          format: double
          example: 2500.00
        startDate:
          type: string
          format: date
          example: "2026-06-15"
        endDate:
          type: string
          format: date
          example: "2026-06-18"
        totalCapacity:
          type: integer
          example: 30
        availableCapacity:
          type: integer
          example: 12
        places:
          type: array
          items:
            type: string
          example: ["Göreme Açık Hava Müzesi", "Uçhisar Kalesi", "Derinkuyu Yeraltı Şehri"]
        images:
          type: array
          items:
            type: string
            format: uri
          example:
            - "https://example.com/images/kapadokya1.jpg"
            - "https://example.com/images/kapadokya2.jpg"
        companyId:
          type: string
          example: "comp_001"
        companyName:
          type: string
          example: "Gezgin Tur A.Ş."
        guideId:
          type: string
          nullable: true
          example: "guide_001"
        guideName:
          type: string
          nullable: true
          example: "Mehmet Demir"
        rating:
          type: number
          format: double
          example: 4.7
        reviewCount:
          type: integer
          example: 45
        reviews:
          type: array
          items:
            $ref: '#/components/schemas/Review'
        createdAt:
          type: string
          format: date-time
          example: "2025-12-01T09:00:00Z"

    TourListResponse:
      type: object
      properties:
        tours:
          type: array
          items:
            $ref: '#/components/schemas/TourSummary'
        totalCount:
          type: integer
          example: 150
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20

    TourCreateRequest:
      type: object
      required: [name, description, location, price, startDate, endDate, totalCapacity]
      properties:
        name:
          type: string
          example: "Ege Kıyıları Turu"
        description:
          type: string
          example: "Ege'nin en güzel koylarını keşfedin..."
        location:
          type: string
          example: "Muğla, Ege"
        price:
          type: number
          format: double
          example: 3500.00
        startDate:
          type: string
          format: date
          example: "2026-07-01"
        endDate:
          type: string
          format: date
          example: "2026-07-05"
        totalCapacity:
          type: integer
          example: 25
        places:
          type: array
          items:
            type: string
          example: ["Ölüdeniz", "Kelebekler Vadisi", "Saklıkent Kanyonu"]
        images:
          type: array
          items:
            type: string
            format: uri
          example:
            - "https://example.com/images/ege1.jpg"

    TourUpdateRequest:
      type: object
      properties:
        name:
          type: string
          example: "Ege Kıyıları Turu - Güncellendi"
        description:
          type: string
          example: "Güncellenen tur açıklaması..."
        location:
          type: string
          example: "Muğla, Ege"
        price:
          type: number
          format: double
          example: 3200.00
        startDate:
          type: string
          format: date
          example: "2026-07-02"
        endDate:
          type: string
          format: date
          example: "2026-07-06"
        totalCapacity:
          type: integer
          example: 30
        places:
          type: array
          items:
            type: string
        images:
          type: array
          items:
            type: string
            format: uri

    CompanyTourDetail:
      type: object
      properties:
        id:
          type: string
          example: "tour_001"
        name:
          type: string
          example: "Kapadokya Balon Turu"
        description:
          type: string
          example: "Kapadokya'nın büyüleyici peri bacalarını kuş bakışı görün..."
        location:
          type: string
          example: "Nevşehir, Kapadokya"
        price:
          type: number
          format: double
          example: 2500.00
        startDate:
          type: string
          format: date
          example: "2026-06-15"
        endDate:
          type: string
          format: date
          example: "2026-06-18"
        totalCapacity:
          type: integer
          example: 30
        filledCapacity:
          type: integer
          example: 18
        remainingCapacity:
          type: integer
          example: 12
        participants:
          type: array
          items:
            $ref: '#/components/schemas/Participant'
        guideId:
          type: string
          nullable: true
          example: "guide_001"
        guideName:
          type: string
          nullable: true
          example: "Mehmet Demir"

    Participant:
      type: object
      properties:
        userId:
          type: string
          example: "usr_12345"
        firstName:
          type: string
          example: "Ali"
        lastName:
          type: string
          example: "Yılmaz"
        purchaseDate:
          type: string
          format: date-time
          example: "2026-03-01T14:00:00Z"

    # ---- Purchase Schemas ----
    PurchaseRequest:
      type: object
      required: [numberOfPeople]
      properties:
        numberOfPeople:
          type: integer
          minimum: 1
          example: 2

    Purchase:
      type: object
      properties:
        id:
          type: string
          example: "purch_001"
        tourId:
          type: string
          example: "tour_001"
        tourName:
          type: string
          example: "Kapadokya Balon Turu"
        userId:
          type: string
          example: "usr_12345"
        numberOfPeople:
          type: integer
          example: 2
        totalPrice:
          type: number
          format: double
          example: 5000.00
        status:
          type: string
          enum: [active, cancelled]
          example: "active"
        purchaseDate:
          type: string
          format: date-time
          example: "2026-03-01T14:00:00Z"
        tourStartDate:
          type: string
          format: date
          example: "2026-06-15"
        tourEndDate:
          type: string
          format: date
          example: "2026-06-18"

    # ---- Favorite Schemas ----
