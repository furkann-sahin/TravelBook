            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Rehber bulunamadı
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ===================== GUIDE TOURS =====================
  /guides/{guideId}/tours:
    get:
