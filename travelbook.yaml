      parameters:
        - name: title
          in: query
          schema:
            type: string
          description: Tur adına göre arar (case-insensitive, kısmi eşleşme)
        - name: location
          in: query
          schema:
            type: string
          description: Lokasyona göre filtreler (case-insensitive, kısmi eşleşme)
        - name: price
          in: query
          schema:
            type: number
          description: Tam fiyat eşleşmesi
        - name: minPrice
          in: query
          schema:
            type: number
          description: Minimum fiyat filtresi
        - name: maxPrice
          in: query
          schema:
            type: number
          description: Maksimum fiyat filtresi
        - name: date
          in: query
          schema:
            type: string
            format: date
          description: Belirli bir tarihte başlayan turlar (gün bazında eşleşme)
      responses:
        '200':
          description: Başarılı
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  results:
