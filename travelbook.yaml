openapi: 3.0.3
info:
  title: TravelBook API
  description: |
    TravelBook platformu için REST API dokümantasyonu.
    Kullanıcılar turları görüntüleyip satın alabilir, firmalar tur oluşturup yönetebilir,
    rehberler firmalara ve turlara kayıt olabilir. JWT tabanlı kimlik doğrulama kullanılır.
  version: 1.0.0
  contact:
    name: TravelBook Team

servers:
  - url: https://travel-book-eosin.vercel.app/api
    description: Production (Vercel)
  - url: http://localhost:3000/api
    description: Local Development

tags:
  - name: User Auth
    description: Kullanıcı kayıt ve giriş işlemleri
  - name: Users
    description: Kullanıcı profili, satın almalar ve favoriler
  - name: Company Auth
    description: Firma kayıt ve giriş işlemleri
  - name: Companies
    description: Firma profili yönetimi
  - name: Company Tours
    description: Firma tur yönetimi (CRUD)
  - name: Guide Auth
    description: Rehber kayıt ve giriş işlemleri
  - name: Guides
    description: Rehber profil ve listeleme
  - name: Guide Tours
    description: Rehber tur atama/ayrılma
  - name: Guide Companies
    description: Rehber firma kayıt/ayrılma
  - name: Tours
    description: Genel tur listeleme ve detay (Public)
  - name: Reviews
    description: Tur yorum işlemleri

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token — Login/Register sonucu dönen token değeri

  schemas:
    # ──────────── Ortak ────────────
    ErrorResponse:
      type: object
      properties:
        status:
          type: string
          example: error
        message:
          type: string
          example: Sunucu hatası oluştu
        statusCode:
          type: integer
          example: 500

    SuccessMessage:
      type: object
      properties:
        status:
          type: string
          example: success
        message:
          type: string

    # ──────────── User ────────────
    UserRegisterRequest:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          example: Recep Arslan
        email:
          type: string
          format: email
          example: recep@example.com
        password:
          type: string
          format: password
          example: Sifre123!
        phone:
          type: string
          example: "05551234567"

    UserLoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: recep@example.com
        password:
          type: string
          format: password
          example: Sifre123!

    AuthResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        message:
          type: string
          example: Recep Arslan başarıyla kayıt oldu
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...

    User:
      type: object
      properties:
        _id:
          type: string
          example: 665a1f2b3c4d5e6f7a8b9c0d
        name:
          type: string
          example: Recep Arslan
        email:
          type: string
          format: email
          example: recep@example.com
        phone:
          type: string
          example: "05551234567"
        favorites:
          type: array
          items:
            type: string
          description: Favori tur ID listesi
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    UserUpdateRequest:
      type: object
      properties:
        name:
          type: string
          example: Recep Yeni
        phone:
          type: string
          example: "05559876543"

    UserPasswordUpdateRequest:
      type: object
      required: [oldPassword, newPassword]
      properties:
        oldPassword:
          type: string
          format: password
          example: EskiSifre123
        newPassword:
          type: string
          format: password
          example: YeniSifre456

    # ──────────── Company ────────────
    CompanyRegisterRequest:
      type: object
      required: [name, email, password, phone, address]
      properties:
        name:
          type: string
          example: Gezgin Turizm
        email:
          type: string
          format: email
          example: info@gezgin.com
        password:
          type: string
          format: password
          example: Sifre123!
        phone:
          type: string
          example: "02121234567"
        address:
          type: string
          example: İstanbul, Kadıköy
        description:
          type: string
          example: Türkiye'nin en köklü tur firması

    CompanyLoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    Company:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        address:
          type: string
        description:
          type: string
        rating:
          type: number
          minimum: 0
          maximum: 5
        tourCount:
          type: integer
        profileImageUrl:
          type: string
          nullable: true
        bannerImageUrl:
          type: string
          nullable: true
        instagram:
          type: string
        linkedin:
          type: string
        registeredGuides:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CompanyUpdateRequest:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        address:
          type: string
        description:
          type: string
        instagram:
          type: string
        linkedin:
          type: string

    # ──────────── Guide ────────────
    GuideRegisterRequest:
      type: object
      required: [firstName, lastName, email, password]
      properties:
        firstName:
          type: string
          example: Ahmet
        lastName:
          type: string
          example: Yılmaz
        email:
          type: string
          format: email
          example: ahmet@example.com
        password:
          type: string
          format: password
          example: Sifre123!
        phone:
          type: string
          example: "05551112233"
        biography:
          type: string
          example: 10 yıllık deneyimli rehber
        languages:
          type: array
          items:
            type: string
          example: [Türkçe, İngilizce]
        expertRoutes:
          type: array
          items:
            type: string
          example: [Kapadokya, Efes]
        experienceYears:
          type: integer
          example: 10
        instagram:
          type: string
        linkedin:
          type: string

    GuideLoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    GuideAuthResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        message:
          type: string
          example: Ahmet başarıyla kayıt oldu
        token:
          type: string
        guideId:
          type: string

    Guide:
      type: object
      properties:
        _id:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        biography:
          type: string
        languages:
          type: array
          items:
            type: string
        expertRoutes:
          type: array
          items:
            type: string
        experienceYears:
          type: integer
        rating:
          type: number
          minimum: 0
          maximum: 5
        reviewCount:
          type: integer
        profileImageUrl:
          type: string
          nullable: true
        instagram:
          type: string
        linkedin:
          type: string
        registeredTours:
          type: array
          items:
            type: string
        registeredCompanies:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    GuideUpdateRequest:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string
        biography:
          type: string
        languages:
          type: array
          items:
            type: string
        expertRoutes:
          type: array
          items:
            type: string
        experienceYears:
          type: integer
        profileImageUrl:
          type: string
        instagram:
          type: string
        linkedin:
          type: string

    GuideListItem:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
          example: Ahmet Yılmaz
        email:
          type: string
        phone:
          type: string
        experience:
          type: integer
        languages:
          type: array
          items:
            type: string
        bio:
          type: string
        rating:
          type: number
        profileImage:
          type: string
          nullable: true

    CompanyGuideListItem:
      type: object
      properties:
        id:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: string
        languages:
          type: array
          items:
            type: string
        expertRoutes:
          type: array
          items:
            type: string
        rating:
          type: number

    # ──────────── Tour ────────────
    TourCreateRequest:
      type: object
      required: [name, description, location, price, startDate, endDate, totalCapacity]
      properties:
        name:
          type: string
          example: Kapadokya Turu
        description:
          type: string
          example: 3 günlük Kapadokya gezisi
        location:
          type: string
          example: Nevşehir
        price:
          type: number
          minimum: 0
          example: 2500
        startDate:
          type: string
          format: date-time
          example: "2026-06-01T08:00:00Z"
        endDate:
          type: string
          format: date-time
          example: "2026-06-03T18:00:00Z"
        totalCapacity:
          type: integer
          minimum: 1
          example: 30
        places:
          type: array
          items:
            type: string
          example: [Göreme, Ürgüp, Derinkuyu]
        departureLocation:
          type: string
          example: İstanbul
        arrivalLocation:
          type: string
          example: Nevşehir
        services:
          type: array
          items:
            type: string
          example: [Konaklama, Ulaşım, Yemek]
        guideId:
          type: string
          description: Atanacak rehberin ID'si (firmaya kayıtlı olmalı)
          example: 665a1f2b3c4d5e6f7a8b9c0d
        image:
          type: string
          format: binary
          description: Tur kapak görseli (multipart/form-data)

    TourUpdateRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        location:
          type: string
        price:
          type: number
          minimum: 0
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        totalCapacity:
          type: integer
          minimum: 1
        departureLocation:
          type: string
        arrivalLocation:
          type: string
        places:
          type: array
          items:
            type: string
        services:
          type: array
          items:
            type: string

    Tour:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        title:
          type: string
        description:
          type: string
        location:
          type: string
        price:
          type: number
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        totalCapacity:
          type: integer
        filledCapacity:
          type: integer
        places:
          type: array
          items:
            type: string
        departureLocation:
          type: string
        arrivalLocation:
          type: string
        duration:
          type: string
        included:
          type: array
          items:
            type: string
        images:
          type: array
          items:
            type: string
        services:
          type: array
          items:
            type: string
        companyId:
          type: string
        guideId:
          type: string
          nullable: true
        rating:
          type: number
        reviewCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    TourListItem:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        location:
          type: string
        departureLocation:
          type: string
        arrivalLocation:
          type: string
        places:
          type: array
          items:
            type: string
        price:
          type: number
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        imageUrl:
          type: string
          nullable: true
        services:
          type: array
          items:
            type: string
        companyName:
          type: string
          nullable: true
        guideName:
          type: string
          nullable: true
        rating:
          type: number

    TourDetail:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        price:
          type: number
        location:
          type: string
        departureLocation:
          type: string
        arrivalLocation:
          type: string
        date:
          type: string
          format: date-time
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        duration:
          type: string
        included:
          type: array
          items:
            type: string
        services:
          type: array
          items:
            type: string
        places:
          type: array
          items:
            type: string
        images:
          type: array
          items:
            type: string
        companyName:
          type: string
          nullable: true
        guideName:
          type: string
          nullable: true
        reviews:
          type: array
          items:
            $ref: '#/components/schemas/Review'

    CompanyTourListItem:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        location:
          type: string
        price:
          type: number
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        imageUrl:
          type: string
          nullable: true
        services:
          type: array
          items:
            type: string
        companyName:
          type: string
        rating:
          type: number

    CompanyTourDetail:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        location:
          type: string
        price:
          type: number
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        totalCapacity:
          type: integer
        filledCapacity:
          type: integer
        places:
          type: array
          items:
            type: string
        departureLocation:
          type: string
        arrivalLocation:
          type: string
        images:
          type: array
          items:
            type: string
        services:
          type: array
          items:
            type: string
        guideId:
          type: string
          nullable: true
        companyId:
          type: string
        companyName:
          type: string
        guide:
          type: object
          nullable: true
          properties:
            id:
              type: string
            firstName:
              type: string
            lastName:
              type: string
            email:
              type: string
            phone:
              type: string
        rating:
          type: number
        reviewCount:
          type: integer

    # ──────────── Purchase ────────────
    Purchase:
      type: object
      properties:
        _id:
          type: string
        userId:
          type: string
        tourId:
          type: string
        purchaseDate:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PurchaseListItem:
      type: object
      properties:
        id:
          type: string
        purchaseDate:
          type: string
          format: date-time
        tour:
          type: object
          nullable: true
          properties:
            id:
              type: string
            title:
              type: string
            location:
              type: string
            price:
              type: number
            startDate:
              type: string
              format: date-time
            endDate:
              type: string
              format: date-time
            imageUrl:
              type: string
              nullable: true

    # ──────────── Review ────────────
    ReviewCreateRequest:
      type: object
      required: [comment, rating]
      properties:
        comment:
          type: string
          example: Harika bir turdu!
        rating:
          type: integer
          minimum: 1
          maximum: 5
          example: 5

    ReviewUpdateRequest:
      type: object
      properties:
        comment:
          type: string
        rating:
          type: integer
          minimum: 1
          maximum: 5

    Review:
      type: object
      properties:
        id:
          type: string
        tourId:
          type: string
        userId:
          type: string
        userName:
          type: string
        comment:
          type: string
        rating:
          type: integer
          minimum: 1
          maximum: 5
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # ──────────── Favorites ────────────
    FavoriteAddRequest:
      type: object
      required: [tourId]
      properties:
        tourId:
          type: string
          example: 665a1f2b3c4d5e6f7a8b9c0d

    FavoriteListItem:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        location:
          type: string
        price:
          type: number
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        imageUrl:
          type: string
          nullable: true
        companyName:
          type: string
          nullable: true
        rating:
          type: number

    # ──────────── Stats ────────────
    PlatformStats:
      type: object
      properties:
        userCount:
          type: integer
        tourCount:
          type: integer
        companyCount:
          type: integer
        guideCount:
          type: integer

    # ──────────── Company List (for guides) ────────────
    CompanyListItem:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        address:
          type: string
        description:
          type: string
        rating:
          type: number
        tourCount:
          type: integer

paths:
  # ═══════════════════════════════════════════
  #  USER AUTH
  # ═══════════════════════════════════════════
  /users/auth/register:
    post:
      tags: [User Auth]
      summary: Kullanıcı Kayıt
      description: Yeni kullanıcı kaydı oluşturur ve JWT token döner.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegisterRequest'
      responses:
        '201':
          description: Kayıt başarılı
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Zorunlu alanlar eksik
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: E-posta zaten kayıtlı
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Sunucu hatası
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/auth/login:
    post:
      tags: [User Auth]
      summary: Kullanıcı Giriş
      description: E-posta ve şifre ile kullanıcı girişi yapar, JWT token döner.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserLoginRequest'
      responses:
        '200':
          description: Giriş başarılı
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: E-posta ve şifre gereklidir
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Geçersiz kimlik bilgileri
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Sunucu hatası
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ═══════════════════════════════════════════
  #  USER PROFILE & PURCHASES
  # ═══════════════════════════════════════════
  /users/{userId}:
    get:
      tags: [Users]
      summary: Kullanıcı Detayı
      description: Belirtilen kullanıcının profil bilgilerini döner.
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Başarılı
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    $ref: '#/components/schemas/User'
        '404':
          description: Kullanıcı bulunamadı
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags: [Users]
      summary: Kullanıcı Profil Güncelleme
      description: Kullanıcı kendi profil bilgilerini günceller (name, phone).
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
      responses:
        '200':
          description: Profil güncellendi
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Profil başarıyla güncellendi
                  data:
                    $ref: '#/components/schemas/User'
        '400':
          description: Güncellenecek alan bulunamadı
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Yetkisiz (Token gerekli)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Yalnızca kendi profilinizi güncelleyebilirsiniz
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Kullanıcı bulunamadı
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags: [Users]
      summary: Kullanıcı Hesap Silme
      description: Kullanıcı kendi hesabını siler.
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Hesap başarıyla silindi
        '401':
          description: Yetkisiz
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Yalnızca kendi hesabınızı silebilirsiniz
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Kullanıcı bulunamadı
          content:
            application/json:
              schema:
